<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoltGain</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
  color: white;
  padding: 20px;
}

header {
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 2.5rem;
  color: #00ffff;
}

.actions {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 30px 0;
}

.action-btn {
  background: #1e90ff;
  border: none;
  padding: 15px 25px;
  border-radius: 10px;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.3s;
}

.action-btn:hover {
  background: #00bfff;
}

.plans {
  display: flex;
  flex-direction: column;
  gap: 20px;
  max-width: 500px;
  margin: 0 auto;
}

.plan {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
}

.plan h3 {
  font-size: 1.5rem;
  color: #ffff00;
}

.plan p {
  margin-top: 10px;
  font-size: 1rem;
}

  </style>
</head><body>
  <header>
    <h1>⚡ VoltGain ⚡</h1>
    <p>Earn daily rewards with electric battery investments</p>
  </header>  <div class="actions">
    <button class="action-btn">🔌 Deposit</button>
    <button class="action-btn">💸 Withdraw</button>
    <button class="action-btn">❓ Help</button>
  </div><div class="upi-section">
  <h3>Scan UPI to Deposit</h3>
  <img src="assets/upi-qr.png" alt="UPI QR Code" class="upi-qr" />
  <p>UPI ID: voltgain@upi</p>
  </div>  <section class="plans">
    <div class="plan">
      <h3>₹199 Plan</h3>
      <p>Daily Income: ₹50 for 5 days</p>
      <p>Total Return: ₹250</p>
    </div>
    <div class="plan">
      <h3>₹499 Plan</h3>
      <p>Daily Income: ₹250 for 5 days</p>
      <p>Total Return: ₹1250</p>
    </div>
    <div class="plan">
      <h3>₹999 Plan</h3>
      <p>Daily Income: ₹499 for 5 days</p>
      <p>Total Return: ₹2495</p>
    </div>
  </section>
</body></html>
